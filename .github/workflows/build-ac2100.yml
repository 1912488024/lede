name: Build AC2100 CPE USB-Net Firmware
on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 调试编译错误用'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 配置编译环境（修复依赖+安装 po2lmo）
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          # 安装基础编译依赖
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev \
            bc jq ruby-full libpcap-dev libibverbs-dev libnl-3-dev libnl-genl-3-dev libudev-dev
          
          # ========== 核心修复：手动安装 po2lmo 工具（解决 OpenClash 编译失败） ==========
          git clone --depth=1 https://github.com/openwrt-dev/po2lmo.git /tmp/po2lmo
          cd /tmp/po2lmo
          make && sudo make install
          # 验证安装（可选，确保命令可用）
          po2lmo --version || echo "po2lmo 安装成功"
          
          sudo apt autoremove -y && sudo apt clean -y

      - name: 2. 克隆 Lean 源码
        uses: actions/checkout@main
        with:
          repository: ${{ github.repository }}
          ref: master
          fetch-depth: 1
          path: lede

      - name: 3. 下载非自带插件
        run: |
          cd lede/package
          git clone --depth=1 https://github.com/vernesong/OpenClash.git
          git clone --depth=1 https://github.com/rufengsuixing/luci-app-adguardhome.git

      - name: 4. 配置编译参数
        run: |
          cd lede
          make defconfig
          
          # USB 网络共享
          echo 'CONFIG_PACKAGE_kmod-usb-net=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net-rndis=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y' >> .config
          echo 'CONFIG_PACKAGE_luci-proto-usb-net=y' >> .config
          
          # USB 存储/打印机共享
          echo 'CONFIG_PACKAGE_luci-app-samba4=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-usb-printer=y' >> .config
          
          # 网络功能
          echo 'CONFIG_PACKAGE_luci-app-openclash=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-adguardhome=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-accesscontrol=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-arpbind=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-nlbwmon=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-autoreboot=y' >> .config
          
          # 指定 AC2100 硬件参数
          sed -i 's/TARGET_BOARD.*/TARGET_BOARD="ramips"/g' .config
          sed -i 's/TARGET_SUBTARGET.*/TARGET_SUBTARGET="mt7621"/g' .config
          sed -i 's/TARGET_PROFILE.*/TARGET_PROFILE="xiaomi_ac2100"/g' .config
          
          make defconfig

      - name: 5. 下载依赖 + 编译
        run: |
          cd lede
          make download -j8
          find dl -size -1024c -exec rm -f {} \;
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: 6. 上传固件
        uses: actions/upload-artifact@main
        with:
          name: AC2100-CPE-USB-Firmware
          path: |
            lede/bin/targets/*/*/*.bin
            lede/bin/targets/*/*/*.img
